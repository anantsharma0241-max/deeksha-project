<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Deeksha Di ❤️</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <div class="profile-pics">

            <img id="bhai-pic" src="bhai_profile.jpg.jpg" alt="Bhai Photo">

            <img id="deeksha-pic" src="deeksha_profile.jpg.jpg" alt="Deeksha Photo">

        </div>

        <h1 id="question">
            Oye Deeksha! Kya main tera favorite bhai hoon? 😇
        </h1>

        <p id="sub-text">
            Sach bolna, mummy ki kasam 😂
        </p>

        <div class="buttons" id="btn-group">

            <button id="yes-btn">
                Yes, of course!
            </button>

            <button id="no-btn">
                Bilkul nahi 🤢
            </button>

        </div>

        <div id="yes-content" style="display:none;">

            <h2>
                I knew it ❤️
            </h2>

            <p>
                World's Best Behan 😎
            </p>

            <select id="treat-choice">

                <option value="Pizza Party">
                    Pizza Party 🍕
                </option>

                <option value="Chocolate Box">
                    Chocolate Box 🍫
                </option>

                <option value="1000 Rupee Cash">
                    ₹1000 Cash 💸
                </option>

            </select>

            <br><br>

            <button id="confirm-btn">
                Confirm Order
            </button>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
